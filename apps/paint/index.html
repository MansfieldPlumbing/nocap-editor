<!--
  Pro Paint Shop — single-file vanilla applet (the 2D paint app; living reference for a true flickpaint3d).
  Truth is NOT held in this page. All live state flows through the Sys facade
  (Sys.registry = Cm-shaped contract/catalog, Sys.vom = Vom-shaped object store).
  Standalone (github.io / file://) binds an EmbeddedProvider; a subsystem host
  that injects window.__SUBSYSTEM_PROVIDER__ (or chrome.webview) takes over with
  ZERO UI changes — that is the .obp mode. See #obp-manifest below.
-->
<script type="application/json" id="obp-manifest">
{
  "obp": 1,
  "type": "Applet",
  "name": "Pro Paint Shop",
  "title": "Pro Paint Shop",
  "mount": "\\Applets\\FlickPaint",
  "entry": "index.html",
  "provider": { "contract": "1.0", "inject": "window.__SUBSYSTEM_PROVIDER__" },
  "requires": {
    "registry": ["Resolve", "Set", "Enumerate"],
    "vom": ["Register", "Open", "Query", "Set", "Enumerate", "Unregister", "Wait", "Signal"]
  },
  "projects": {
    "\\Document": "the live painting document (canvas dims, layers, selection)",
    "\\Session": "session settings (tool, color, brush size/opacity, view)",
    "\\Catalog": "read-only contract: tools, brushes, swatches, blend modes"
  }
}
</script>

<script type="module">
/* ============================================================================
 *  SYS FACADE — the only source of truth.  registry (Cm) + vom (Vom).
 *  bootProvider() binds a host-injected provider (.obp mode) or the embedded
 *  shim (standalone / github.io).  The UI never owns state — it asks Sys.
 * ========================================================================== */

const P = {
  doc:       '\\Document',
  layers:    '\\Document\\Layers',
  selection: '\\Document\\Selection',
  session:   '\\Session',
  catalog:   '\\Catalog',
};
const layerPath = (id) => `\\Document\\Layers\\${id}`;

function createEmbeddedVom() {
  const objects = new Map();   // path -> { path, type, values }
  const subs = new Map();      // path -> Set<cb>
  const emitUp = (path) => {
    let p = path;
    for (;;) {
      const s = subs.get(p); if (s) s.forEach((cb) => cb(path));
      const i = p.lastIndexOf('\\');
      if (i <= 0) break;
      p = p.slice(0, i);
    }
    const star = subs.get('*'); if (star) star.forEach((cb) => cb(path));
  };
  return {
    Register(path, type = 'Object', values = {}) {
      let o = objects.get(path);
      if (!o) { o = { path, type, values: { ...values } }; objects.set(path, o); }
      else { Object.assign(o.values, values); }
      emitUp(path); return o;
    },
    Open(path) { return objects.get(path) || null; },
    Query(path) { const o = objects.get(path); return o ? o.values : null; },
    Set(path, key, value) {
      let o = objects.get(path);
      if (!o) { o = { path, type: 'Object', values: {} }; objects.set(path, o); }
      o.values[key] = value; emitUp(path);
    },
    Merge(path, patch) {
      let o = objects.get(path);
      if (!o) { o = { path, type: 'Object', values: {} }; objects.set(path, o); }
      Object.assign(o.values, patch); emitUp(path);
    },
    Enumerate(prefix) {
      const pre = prefix.endsWith('\\') ? prefix : prefix + '\\';
      const seen = new Set(); const out = [];
      for (const k of objects.keys()) {
        if (k.startsWith(pre) && k !== prefix) {
          const first = k.slice(pre.length).split('\\')[0];
          if (first && !seen.has(first)) { seen.add(first); out.push(pre + first); }
        }
      }
      return out;
    },
    Unregister(path) {
      for (const k of [...objects.keys()]) {
        if (k === path || k.startsWith(path + '\\')) objects.delete(k);
      }
      emitUp(path);
    },
    Wait(path, cb) {
      if (!subs.has(path)) subs.set(path, new Set());
      subs.get(path).add(cb);
      return () => subs.get(path) && subs.get(path).delete(cb);
    },
    Signal(path) { emitUp(path); },
    _dump() { return [...objects.keys()].sort(); },
  };
}

function createEmbeddedRegistry(seed) {
  const data = { ...seed };
  return {
    Resolve(path) { return data[path]; },
    Set(path, val) { data[path] = val; },
    Enumerate(path) {
      const pre = path.endsWith('\\') ? path : path + '\\';
      const seen = new Set();
      for (const k of Object.keys(data)) {
        if (k.startsWith(pre)) { const first = k.slice(pre.length).split('\\')[0]; if (first) seen.add(pre + first); }
      }
      return [...seen];
    },
  };
}

function bootProvider() {
  const injected = window.__SUBSYSTEM_PROVIDER__;
  if (injected && injected.vom && injected.registry) {
    return { mode: 'obp', ...injected };
  }
  // chrome.webview present but no object injected: we still run embedded, but flag it
  const host = !!(window.chrome && window.chrome.webview);
  return {
    mode: host ? 'obp-pending' : 'standalone',
    vom: createEmbeddedVom(),
    registry: createEmbeddedRegistry(CATALOG),
  };
}

const Sys = bootProvider();

/* convenience accessors */
const session = (k) => { const v = Sys.vom.Query(P.session); return v ? v[k] : undefined; };
const setSession = (k, v) => Sys.vom.Set(P.session, k, v);

const setOrder = (arr) => Sys.vom.Set(P.layers, 'order', arr);
const getLayer = (id) => Sys.vom.Query(layerPath(id));
const setLayer = (id, patch) => Sys.vom.Merge(layerPath(id), patch);
const getLayers = () => getOrder().map((id) => getLayer(id)).filter(Boolean);
const doc = (k) => { const v = Sys.vom.Query(P.doc); return v ? v[k] : undefined; };

/* tiny reactive helper: run render now and whenever path (or descendants) change */
function bind(path, render) { render(); return Sys.vom.Wait(path, render); }

const $ = (s) => document.querySelector(s);

const blendCss = (m) => ({ Normal: 'normal', Multiply: 'multiply', Screen: 'screen', Overlay: 'overlay', Dodge: 'color-dodge', Burn: 'color-burn' }[m] || 'normal');

function reconcileLayers() {
  const artboard = $('#artboard'); const W = doc('width'), H = doc('height'); const order = getOrder();
  artboard.style.display = order.length ? 'block' : 'none'; // no canvas until a document exists (1:1 with the reference)
  artboard.style.width = W + 'px'; artboard.style.height = H + 'px';
  for (const id of order) if (!layerCanvases.has(id)) { const c = document.createElement('canvas'); c.width = W; c.height = H; layerCanvases.set(id, c); }
  for (const id of [...layerCanvases.keys()]) if (!order.includes(id)) { layerCanvases.get(id).remove(); layerCanvases.delete(id); }

/* ---- History (ImageData snapshots, ported from HistoryManager) — also tracks the selection ---- */
const History = (() => {
  let undo = [], redo = [], max = 40;
  const sync = () => { setSession('canUndo', undo.length > 1); setSession('canRedo', redo.length > 0); };
  const grab = () => ({ w: doc('width'), h: doc('height'), layers: allCanvasRefs().filter((l) => l.canvas.width > 0).map((l) => ({ id: l.id, w: l.canvas.width, h: l.canvas.height, data: l.canvas.getContext('2d').getImageData(0, 0, l.canvas.width, l.canvas.height) })), sel: doc('selection') || null });
  const apply = (st) => {
    let dim = false;
    if (st.w && st.h && (st.w !== doc('width') || st.h !== doc('height'))) { Sys.vom.Set(P.doc, 'width', st.w); Sys.vom.Set(P.doc, 'height', st.h); dim = true; }
    st.layers.forEach((s) => {
      const c = layerCanvases.get(s.id); if (!c) return;
      if (s.w && s.h && (c.width !== s.w || c.height !== s.h)) { c.width = s.w; c.height = s.h; dim = true; }   // resizing the canvas also clears it; the putImageData below repaints
      c.getContext('2d').putImageData(s.data, 0, 0);
    });

    if (dim) { reconcileLayers(); recenter(); setView('center'); }   // dimensions changed (crop/resize undo) — refit the view
  };

    push() { const st = grab(); if (!st.layers.length) return; undo.push(st); if (undo.length > max) undo.shift(); redo = []; sync(); },
    clear() { undo = []; redo = []; sync(); },
    undo() { if (undo.length <= 1) return; redo.push(grab()); apply(undo.pop()); sync(); },   // apply the POPPED (pre-edit) snapshot, like the TS HistoryManager — not the new top
    redo() { if (!redo.length) return; undo.push(grab()); apply(redo.pop()); sync(); },

function toolCtx() {
  const id = session('activeLayerId') !== undefined ? doc('activeLayerId') : doc('activeLayerId');
  const aid = doc('activeLayerId'); const ldef = getLayer(aid); const canvas = layerCanvases.get(aid);
  if (!ldef || !canvas) return null;

  if (!sysSel && (ldef.locked || !ldef.visible)) return null;

    canvas, ctx: canvas.getContext('2d'), overlayCanvas, overlayCtx: overlayCanvas.getContext('2d'),
    transform: { ...view }, color: session('color'), size: session('brushSize'), opacity: session('opacity'),
    pushUndoState: pushUndo, commit() {},
  };

/* ---- pointer handling: draw / pan / pinch / wheel ---- */
const pointers = new Map();

let pinch = null;

function initEngine() {
  const vp = $('#viewport');

  vp.addEventListener('pointerdown', (e) => {
    const edge = 40;

      const pt = canvasPoint(e);

      // oversized crop). Pan is middle/right-drag, space-drag, or the Hand tool.
      const wantPan = session('tool') === 'hand' || e.button === 1 || e.button === 2 || spaceDown;
      if (wantPan) { panning = true; drawing = false; dragStart = { ex: e.clientX, ey: e.clientY, tx: view.x, ty: view.y }; }
      else { panning = false; drawing = true; selMods = { shift: e.shiftKey, alt: e.altKey }; const c = toolCtx(); const t = Tools[session('tool')]; if (c && t && t.onPointerDown) t.onPointerDown(pt, c); }

  const clip = window.__clip; if (!clip) { hud('Clipboard empty'); return; } pushUndo();
  const id = Date.now(); const order = getOrder(); const aidx = order.indexOf(doc('activeLayerId'));
  Sys.vom.Register(layerPath(id), 'Layer', { id, name: 'Pasted Pixels', visible: true, locked: false, alphaLocked: false, blendMode: 'Normal', opacity: 100 });
  const next = [...order]; next.splice(Math.max(0, aidx), 0, id); setOrder(next); Sys.vom.Set(P.doc, 'activeLayerId', id);
  reconcileLayers(); const c = layerCanvases.get(id); c.getContext('2d').drawImage(clip.canvas, clip.x, clip.y); hud('Pasted into new layer');
}

let _thumbLoop = null;
function startThumbs() {
  if (_thumbLoop) return;
  let last = 0;
  const loop = (t) => { if (t - last > 160) { last = t; document.querySelectorAll('[data-thumb]').forEach((cv) => { const src = layerCanvases.get(+cv.dataset.thumb); if (src) { const g = cv.getContext('2d'); g.clearRect(0, 0, 48, 48); g.drawImage(src, 0, 0, src.width, src.height, 0, 0, 48, 48); } }); } _thumbLoop = requestAnimationFrame(loop); };
  _thumbLoop = requestAnimationFrame(loop);
}
function stopThumbs() { if (_thumbLoop) { cancelAnimationFrame(_thumbLoop); _thumbLoop = null; } }
function renderLayerList() {
  const list = $('#layer-list'); if (!list) return; const order = getOrder(); const aid = doc('activeLayerId');
  const active = getLayer(aid);
  $('#blend-cur') && ($('#blend-cur').textContent = active ? active.blendMode : 'Normal');
  $('#lk-lock') && $('#lk-lock').classList.toggle('on', !!(active && active.locked));
  $('#lk-alpha') && $('#lk-alpha').classList.toggle('on', !!(active && active.alphaLocked));

  list.innerHTML = order.map((id) => { const l = getLayer(id); if (!l) return ''; const on = id === aid; return `
    <div class="layer-item ${on ? 'on' : ''}" data-layer="${id}">
      <div class="layer-fill" style="width:${l.opacity}%"></div>
      <div class="row" style="position:relative;z-index:1;flex:1;min-width:0">
        <button class="eyebtn" data-eye="${id}" style="color:rgba(255,255,255,0.5)">${icon(l.visible ? 'eye' : 'eyeoff')}</button>
        <div class="layer-thumb"><canvas data-thumb="${id}" width="48" height="48"></canvas></div>
        <div style="display:flex;flex-direction:column;min-width:0;flex:1">
          <span class="lname" data-name="${id}" style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${l.name}</span>
          <span class="mono" style="font-size:10px;color:rgba(255,255,255,0.4)">${l.blendMode} · ${l.opacity}%</span>
        </div>
      </div>
    </div>`; }).join('');

  list.querySelectorAll('[data-eye]').forEach((b) => b.onclick = (e) => { e.stopPropagation(); const id = +b.dataset.eye; setLayer(id, { visible: !getLayer(id).visible }); reconcileLayers(); });
  list.querySelectorAll('[data-name]').forEach((s) => s.ondblclick = () => { const id = +s.dataset.name; const v = prompt('Layer name:', getLayer(id).name); if (v && v.trim()) setLayer(id, { name: v.trim() }); });
  list.querySelectorAll('[data-layer]').forEach((row) => attachLayerGestures(row));
  startThumbs();   // run always — on desktop the Layers panel is docked (data-view stays 'center')
}

function attachLayerGestures(row) {
  const id = +row.dataset.layer; let mode = 'none', sx = 0, sy = 0, startOp = 100;
  row.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button')) return; Sys.vom.Set(P.doc, 'activeLayerId', id);
    mode = 'none'; sx = e.clientX; sy = e.clientY; startOp = getLayer(id).opacity; row.setPointerCapture(e.pointerId);
  });
  row.addEventListener('pointermove', (e) => {
    if (!row.hasPointerCapture(e.pointerId)) return; const dx = e.clientX - sx, dy = e.clientY - sy;
    if (mode === 'none') { if (Math.abs(dx) > 5 && Math.abs(dx) > Math.abs(dy)) { mode = 'opacity'; } else if (Math.abs(dy) > 6) { mode = 'reorder'; row.classList.add('reorder'); } }
    if (mode === 'opacity') { setLayer(id, { opacity: Math.max(0, Math.min(100, Math.round(startOp + dx / 1.5))) }); reconcileLayers(); }
    else if (mode === 'reorder') {
      const rows = [...$('#layer-list').children]; let ti = -1; for (let i = 0; i < rows.length; i++) { const r = rows[i].getBoundingClientRect(); if (e.clientY >= r.top && e.clientY <= r.bottom) { ti = i; break; } }
      const order = getOrder(); const ci = order.indexOf(id); if (ti >= 0 && ci >= 0 && ci !== ti) { const next = [...order]; next.splice(ci, 1); next.splice(ti, 0, id); setOrder(next); reconcileLayers(); }
    }
  });
  const end = (e) => { try { row.releasePointerCapture(e.pointerId); } catch (x) {} row.classList.remove('reorder'); mode = 'none'; };
  row.addEventListener('pointerup', end); row.addEventListener('pointercancel', end);
}

/* ============================================================================
 *  THUMBSTICK
 * ========================================================================== */
function initStick() {
  const stick = $('#stick'), nub = $('#nub'); const SZ = 130;
  let mode = 'idle', sx = 0, sy = 0, off = { x: 0, y: 0 }, lastX = 0, lastY = 0, moved = false;
  let pos = { x: innerWidth - 150, y: innerHeight - 170 }, nestled = null;
  const place = () => { stick.style.left = pos.x + 'px'; stick.style.top = pos.y + 'px'; };
  const clampY = () => { pos.y = Math.max(8, Math.min(innerHeight - SZ - 8, pos.y)); };

  const nestle = (side) => { nestled = side; stick.classList.add('nestled'); stick.style.pointerEvents = 'none'; nub.style.pointerEvents = 'auto'; pos.x = side === 'left' ? -65 : innerWidth - 65; clampY(); place(); };
  const wake = () => { if (!nestled) return; const side = nestled; nestled = null; stick.classList.remove('nestled'); stick.style.pointerEvents = ''; nub.style.pointerEvents = ''; pos.x = side === 'left' ? 16 : innerWidth - SZ - 16; clampY(); place(); };
  clampY(); place();

    stick.setPointerCapture(e.pointerId); sx = e.clientX; sy = e.clientY; lastX = e.clientX; lastY = e.clientY; off = { x: 0, y: 0 }; moved = false;
    const r = stick.getBoundingClientRect(); const d = Math.hypot(e.clientX - (r.left + SZ / 2), e.clientY - (r.top + SZ / 2));

      clampY(); pos.x = Math.max(-SZ + 30, Math.min(innerWidth - 30, pos.x)); place();   // always keep ≥30px on-screen so it never vanishes
    } else { let nx = e.clientX - sx, ny = e.clientY - sy; const d = Math.hypot(nx, ny); const M = 40; if (d > M) { nx = nx / d * M; ny = ny / d * M; } off = { x: nx, y: ny }; if (d > 4) moved = true; nub.style.transform = `translate(${nx}px,${ny}px)`; }

      else setView('center');

    } else if (mode === 'move' && moved) {

}

/* ============================================================================
 *  SHELL — view switching, swipe gestures, dismiss, grip tabs
 * ========================================================================== */
function setView(v) { document.body.dataset.view = v; setSession('view', v); updateStickLabels(); if (v === 'right') renderLayerList(); startThumbs(); }

function initShell() {
  $('#dismiss').addEventListener('pointerdown', () => setView('center'));
  document.querySelectorAll('.tab[data-toggle]').forEach((t) => t.onclick = () => { const v = t.dataset.toggle; setView(document.body.dataset.view === v ? 'center' : v); });

  // prevent context menu + pull-to-refresh
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // edge swipe gestures
  let startX = 0, startY = 0, t0 = 0, active = false;
  addEventListener('pointerdown', (e) => { if (!e.isPrimary) { active = false; return; } if (e.target.closest('[data-thumbstick]') || e.target.closest('.panel') || e.target.closest('#top')) { active = false; return; } startX = e.clientX; startY = e.clientY; t0 = Date.now(); active = true; });

    } else {
      if (dy > 0) { if (cv === 'bottom') setView('center'); else if (cv === 'center' && startY < ET) setView('top'); }
      else { if (cv === 'top') setView('center'); else if (cv === 'center' && startY > innerHeight - ET) setView('bottom'); }
    }
  });
}

/* ============================================================================

 * ========================================================================== */
function newProject(w = 1080, h = 1080) {
  for (const id of [...layerCanvases.keys()]) { layerCanvases.get(id).remove(); layerCanvases.delete(id); }
  Sys.vom.Unregister(P.layers);
  Sys.vom.Register(P.doc, 'Document', { width: w, height: h, activeLayerId: 1, selection: null });
  seedLayers([{ id: 1, name: 'Painting Layer' }, { id: 2, name: 'Background' }]);
  reconcileLayers(); History.clear(); pushUndo();
  const W = doc('width'), H = doc('height'); const s = Math.min((innerWidth * 0.9) / W, (innerHeight * 0.8) / H);
  view = { x: (innerWidth - W * s) / 2, y: (innerHeight - H * s) / 2, scale: s, rotate: 0 }; applyWorld(); setView('center');
}

  eraseReview = true; compositeSel(incoming, selMode(), c.canvas);
  // seed the point session at the outline centroid so a follow-up ＋/－ tap keeps THIS object
  let cx = 0, cy = 0; for (const p of pts) { cx += p.x; cy += p.y; } _aiPts = [{ x: cx / pts.length, y: cy / pts.length, label: 1 }];
}
function selectionToMask(sel, W, H) {                   // -> layer-size HARD-edged mask
  if (!sel) return null;
  const m = document.createElement('canvas'); m.width = W; m.height = H; const g = m.getContext('2d');

  }

  const id = g.getImageData(0, 0, W, H), d = id.data;

}
function aiClearSel() { eraseReview = false; _aiPts = []; if (doc('selection')) { pushUndo(); setSelection(null); } else updateEraseBar(); }

/* ---- Object-eraser staged action bar: Undo/Redo · Add/Remove refine · Erase CTA ---- */
function initEraseBar() {
  const bar = $('#erasebar'); if (!bar) return;
  $('#eb-undo').onclick = () => History.undo();
  $('#eb-redo').onclick = () => History.redo();
  const setRefine = (mode) => {
    eraseReview = true; aiMode = mode; setSession('tool', 'airefine');
    hud(mode === 'add' ? 'Add — tap parts to include' : 'Remove — tap parts to drop');
    updateEraseBar();
  };
  $('#eb-add').onclick = () => setRefine('add');
  $('#eb-remove').onclick = () => setRefine('remove');
  $('#eb-cancel').onclick = () => { aiClearSel(); hud('Selection cleared'); };
  $('#eb-erase').onclick = () => aiMagicErase();
  paintIcons(bar);
  updateEraseBar();
}
function updateEraseBar() {
  const bar = $('#erasebar'); if (!bar) return;
  const hasSel = !!doc('selection');
  if (!hasSel) eraseReview = false;
  bar.classList.toggle('on', hasSel);
  const undo = $('#eb-undo'), redo = $('#eb-redo'); if (undo) undo.disabled = !session('canUndo'); if (redo) redo.disabled = !session('canRedo');
  const refining = session('tool') === 'airefine';
  $('#eb-add').classList.toggle('on', refining && aiMode === 'add');
  $('#eb-remove').classList.toggle('on', refining && aiMode === 'remove');
}
async function aiMagicErase() {
  if (aiBusy) { hud('Hold on — the AI is still working…'); return; }
  const aid = doc('activeLayerId'); const cv = layerCanvases.get(aid);
  if (!cv) { hud('No active layer'); return; }
  if (getLayer(aid)?.locked) { hud('Layer is locked'); return; }
  const mask = selectionToMask(doc('selection'), cv.width, cv.height);
  if (!mask) { hud('Select what to erase first (Tap / Lasso)'); return; }
  aiNoticeOnce(); aiBusy = true; setView('center'); hud('Loading magic eraser…');
  try {
    const { inpaint } = await import('../../vendor/ml/inpaint.js' + ML_V);
    const patched = await inpaint(cv, mask, (s) => hud(s));
    pushUndo();
    const g = cv.getContext('2d'); g.clearRect(0, 0, cv.width, cv.height); g.drawImage(patched, 0, 0);
    setSelection(null);
    reconcileLayers(); hud('Erased ✨');

}
function showAiAbout() {

    ov.id = 'ai-about-modal';
    ov.style.cssText = 'display:none;position:fixed;inset:0;z-index:320;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px';
    ov.innerHTML = `
      <div class="mica-panel" style="width:min(420px,94vw);max-height:86vh;overflow:auto;border-radius:18px;padding:18px">

          <h2 class="title" style="margin:0">✨ About the AI tools</h2>

function aiNoticeOnce() {
  try { if (localStorage.getItem('a4q-ai-notice')) return; localStorage.setItem('a4q-ai-notice', '1'); } catch (_) {}
  showAiAbout();
}
function loadProject(proj) {
  Sys.vom.Unregister(P.layers); for (const id of [...layerCanvases.keys()]) { layerCanvases.get(id).remove(); layerCanvases.delete(id); }
  Sys.vom.Set(P.doc, 'width', proj.width || 1080); Sys.vom.Set(P.doc, 'height', proj.height || 1080);
  (proj.layers || []).forEach((l) => Sys.vom.Register(layerPath(l.id), 'Layer', { id: l.id, name: l.name, visible: l.visible, locked: l.locked, alphaLocked: l.alphaLocked, blendMode: l.blendMode, opacity: l.opacity }));
  setOrder(proj.order || proj.layers.map((l) => l.id)); Sys.vom.Set(P.doc, 'activeLayerId', (proj.order || proj.layers.map((l) => l.id))[0]); reconcileLayers();
  let pending = 0; (proj.layers || []).forEach((l) => { if (!l.png) return; pending++; const img = new Image(); img.onload = () => { const c = layerCanvases.get(l.id); c && c.getContext('2d').drawImage(img, 0, 0); if (--pending === 0) { History.clear(); pushUndo(); } }; img.src = l.png; });
  if (pending === 0) { History.clear(); pushUndo(); }

function workArea() {
  if (matchMedia('(min-width: 900px)').matches) {
    const L = 248, R = 290, T = 54;
    return { x: L, y: T, w: Math.max(160, innerWidth - L - R), h: Math.max(160, innerHeight - T) };
  }
  return { x: 0, y: 0, w: innerWidth, h: innerHeight };
}
function recenter() { const a = workArea(); const W = doc('width'), H = doc('height'); const s = Math.min((a.w * 0.9) / W, (a.h * 0.85) / H); view = { x: a.x + (a.w - W * s) / 2, y: a.y + (a.h - H * s) / 2, scale: s, rotate: 0 }; applyWorld(); }
/* ---- Crop = document resize (expand-capable); a DOM frame shows outside the artboard ---- */
let _cropFrame = null;
function showCropFrame(rect) {
  if (!_cropFrame) {
    _cropFrame = document.createElement('div');
    _cropFrame.style.cssText = 'position:absolute;pointer-events:none;border:2px dashed #fff;box-shadow:0 0 0 9999px rgba(0,0,0,0.45);z-index:6;display:none';
    $('#world').appendChild(_cropFrame);
  }
  _cropFrame.style.display = 'block';
  _cropFrame.style.left = rect.x + 'px'; _cropFrame.style.top = rect.y + 'px';
  _cropFrame.style.width = rect.w + 'px'; _cropFrame.style.height = rect.h + 'px';
}
function hideCropFrame() { if (_cropFrame) _cropFrame.style.display = 'none'; }
function cropTo(rect) {
  const rx = Math.round(rect.x), ry = Math.round(rect.y);
  const rw = Math.max(1, Math.round(rect.w)), rh = Math.max(1, Math.round(rect.h));
  pushUndo();   // snapshot BEFORE mutating dimensions so undo restores the original canvas size (like every other tool)
  const backups = getOrder().map((id) => { const cv = layerCanvases.get(id); const b = document.createElement('canvas'); b.width = cv.width; b.height = cv.height; b.getContext('2d').drawImage(cv, 0, 0); return { id, b }; });
  Sys.vom.Set(P.doc, 'width', rw); Sys.vom.Set(P.doc, 'height', rh);
  for (const { id } of backups) { const cv = layerCanvases.get(id); cv.width = rw; cv.height = rh; }
  reconcileLayers();
  backups.forEach(({ id, b }) => { const cv = layerCanvases.get(id); cv.getContext('2d').drawImage(b, -rx, -ry); });   // shift content; outside is clipped, new area transparent

/* ---- selection shortcuts ---- */
function selectAll() { const cv = layerCanvases.get(doc('activeLayerId')); if (!cv) return; const m = blankSelMask(cv, false); const g = m.getContext('2d'); g.fillStyle = '#fff'; g.fillRect(0, 0, m.width, m.height); pushUndo(); publishSelMask(m, cv); hud('Selected all'); }
function deselect() { if (doc('selection')) { pushUndo(); setSelection(null); } }
function deleteSelection() {
  const aid = doc('activeLayerId'); const cv = layerCanvases.get(aid); const sel = doc('selection');
  if (!cv || !sel || getLayer(aid)?.locked) return;
  pushUndo(); const mask = selectionToMask(sel, cv.width, cv.height); if (!mask) return;
  const g = cv.getContext('2d'); g.save(); g.globalCompositeOperation = 'destination-out'; g.drawImage(mask, 0, 0); g.restore();
}

function applyResize(nw, nh) {
  if (!(nw > 0 && nh > 0)) return;
  pushUndo();   // snapshot BEFORE resize so undo restores the original dimensions
  const backups = getOrder().map((id) => { const cv = layerCanvases.get(id); const b = document.createElement('canvas'); b.width = cv.width; b.height = cv.height; b.getContext('2d').drawImage(cv, 0, 0); return { id, b }; });
  Sys.vom.Set(P.doc, 'width', nw); Sys.vom.Set(P.doc, 'height', nh);
  for (const { id } of backups) { const cv = layerCanvases.get(id); cv.width = nw; cv.height = nh; }
  reconcileLayers();
  backups.forEach(({ id, b }) => { const cv = layerCanvases.get(id); cv.getContext('2d').drawImage(b, (nw - b.width) / 2, (nh - b.height) / 2); });
  recenter(); setView('center');
}

/* ============================================================================
 *  BOOT
 * ========================================================================== */
function persistSession() {
  if (Sys.mode !== 'standalone') return;
  try {
    const keep = {}; ['tool', 'color', 'brushSize', 'opacity', 'tolerance', 'thumbstickEnabled'].forEach((k) => keep[k] = session(k));
    localStorage.setItem('flickpaint.session', JSON.stringify(keep));
  } catch (e) {}
}

function boot() {
  // Session settings (truth in VOM \Session). Restore persisted standalone settings.
  let saved = {}; try { saved = JSON.parse(localStorage.getItem('flickpaint.session') || '{}'); } catch (e) {}
  Sys.vom.Register(P.session, 'Session', {
    tool: saved.tool || 'brush', color: saved.color || '#111827',
    brushSize: saved.brushSize || 18, opacity: saved.opacity || 100,
    tolerance: saved.tolerance ?? 42,
    view: 'center', thumbstickEnabled: saved.thumbstickEnabled === true,   // off by default; opt-in via the joystick toggle
    canUndo: false, canRedo: false,
  });

  // Document (truth in VOM \Document) — boot EMPTY, like the reference: just the dark pasteboard,
  // no artboard/checkerboard until the user picks New or Open.
  Sys.vom.Register(P.doc, 'Document', { width: 1080, height: 1080, activeLayerId: null, selection: null });
  Sys.vom.Register(P.layers, 'Layers', { order: [] });

  reconcileLayers();
  bind(P.layers, reconcileLayers);
  bind(P.doc, () => { const W = doc('width'), H = doc('height'); $('#artboard').style.width = W + 'px'; $('#artboard').style.height = H + 'px'; });

  buildLeft(); buildRight(); buildTop(); buildBottom(); buildAssets();
  initEngine(); initShell(); initStick(); initEraseBar();
  bind(P.doc, updateEraseBar); bind(P.session, updateEraseBar);   // bar follows selection + tool/undo state
  bind(P.session, () => { const t = session('tool'); if (t && t !== 'picker') _toolPrev = t; });   // remember tool before the eyedropper
  paintIcons();

  History.clear(); pushUndo();
  refreshCursor(); updateStickLabels();

  $('#mode').textContent = `Sys: ${Sys.mode} · truth in registry+vom`;
  Sys.vom.Wait('*', persistSession);

  // expose for verification / host bridging (a handle, not state — same role as the host provider hook)
  window.Sys = Sys;
  window.__fp = {
    Sys, P, Tools, layerCanvases, History,
    get view() { return view; }, setView, refreshCursor,
    doc, session, setSession, getOrder, getLayer, getLayers, setSelection,
    toolCtx, reconcileLayers, applyWorld, recenter,
    doCopy, doCut, doPaste, exportPNG, saveProject, loadProject, newProject, applyResize, importFile, hud,
  };
  console.log('[Pro Paint Shop] booted — provider mode:', Sys.mode);
}
