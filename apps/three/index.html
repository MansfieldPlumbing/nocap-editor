<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>flickpaint3d — art4quinn</title>

<!-- Shared hand-made glass chrome (cobalt refresh). Same UI as FlickPaint 2D. -->
<link rel="stylesheet" href="../../vendor/ui/flickpaint-ui.css">
<style>
  /* 3D-only bits the shared chrome doesn't define */
  body { background: radial-gradient(120% 90% at 50% 0%, #1c1c1f 0%, #141416 55%, #101012 100%); }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) body { background: radial-gradient(120% 90% at 50% 0%, #eceef2 0%, #f1f3f6 55%, #f6f7fa 100%); }
  }
  :root[data-theme="light"] body { background: radial-gradient(120% 90% at 50% 0%, #eceef2 0%, #f1f3f6 55%, #f6f7fa 100%); }
  #viewport { cursor: default; transition: filter .45s ease; }
  /* no #stage wrapper here — dim the live 3D viewport when a panel opens (mobile only) */
  body[data-view="left"]   #viewport,
  body[data-view="right"]  #viewport,
  body[data-view="bottom"] #viewport { filter: brightness(.7); }
  @media (min-width: 900px) { body[data-view] #viewport { filter: none; } }
  #status {
    position: absolute; top: 84px; left: 50%; transform: translateX(-50%); z-index: 36;
    padding: 6px 14px; border-radius: 999px; font-size: 11px; color: rgba(var(--fg-rgb), 0.72);
    max-width: 72vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none;
  }
  .deck .brand-mini { font-weight: 800; letter-spacing: .3px; }
  .panel .col-color { width: 100%; height: 34px; border: 1px solid var(--line); border-radius: 9px; background: none; padding: 2px; cursor: pointer; }
</style>
</head>
<body data-view="center">

<div id="root">
  <div id="viewport"></div>      <!-- Three.js renderer mounts here (unchanged) -->
  <div id="dismiss"></div>

  <!-- Edge-grip tabs (mobile) -->
  <div class="tabs">
    <div class="tab left mica-panel" data-toggle="left" title="Tools">
      <span class="ic"><svg viewBox="0 0 24 24"><rect x="11" y="6" width="2" height="12" rx="1" fill="currentColor"/></svg></span>
    </div>
    <div class="tab right mica-panel" data-toggle="right" title="Scene">
      <span class="ic"><svg viewBox="0 0 24 24"><rect x="11" y="6" width="2" height="12" rx="1" fill="currentColor"/></svg></span>
    </div>
    <div class="tab bottom mica-panel" data-toggle="bottom" title="Characters">
      <span class="ic"><svg viewBox="0 0 24 24"><rect x="6" y="11" width="12" height="2" rx="1" fill="currentColor"/></svg></span>
    </div>
  </div>

  <!-- Top window blind + deck -->
  <div id="top" class="mica-panel">
    <div id="blind"><div class="blind-inner">
      <h2 class="title">flickpaint3d</h2>
      <p class="muted" style="font-size:11px;margin-top:8px;line-height:1.5">
        Pick a character, drag the model to paint, drag the background to spin. Pinch to zoom.
      </p>
    </div></div>
    <div class="deck" id="deck">
      <div class="row">
        <a class="iconbtn" href="../" title="Home">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg></span>
        </a>
      </div>
      <div class="brand-mini mono">flick<b style="color:var(--indigo-2)">paint</b>3d</div>
      <div class="row">
        <button class="iconbtn" id="shot" title="Save a picture of the scene">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><circle cx="12" cy="13" r="3.5"/><path d="M8.5 7l1.5-3h4l1.5 3"/></svg></span>
        </button>
        <button class="iconbtn" id="save" title="Save the painted skin">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M5 3h11l3 3v15H5z"/><path d="M8 3v5h7"/><rect x="8" y="13" width="8" height="6"/></svg></span>
        </button>
        <button class="iconbtn" id="stick-toggle" title="Joystick">
          <span class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg></span>
        </button>
      </div>
    </div>
    <div class="chev" id="chev" title="Pull down / slide up">
      <span class="ic"><svg viewBox="0 0 24 24"><rect x="6" y="11" width="12" height="2" rx="1" fill="currentColor"/></svg></span>
    </div>
  </div>

  <!-- LEFT: paint tools -->
  <div class="panel left mica-panel" id="panel-left">
    <h2 class="title" style="margin-bottom:14px">Paint</h2>
    <div class="row" style="margin-bottom:14px">
      <div class="toolcell active" id="brush" style="flex:1"><span style="font-size:18px">🖌️</span><span>Brush</span></div>
      <div class="toolcell" id="eraser" style="flex:1"><span style="font-size:18px">🧽</span><span>Erase</span></div>
    </div>
    <label class="field-label">Size <span id="sizeVal" class="mono" style="float:right;color:#fff">26</span></label>
    <input type="range" id="size" min="4" max="120" value="26" style="width:100%;margin-bottom:14px">
    <label class="field-label">Opacity <span id="opacityVal" class="mono" style="float:right;color:#fff">90%</span></label>
    <input type="range" id="opacity" min="5" max="100" value="90" style="width:100%;margin-bottom:16px">
    <h3 class="section" style="margin-bottom:8px">Color</h3>
    <div class="swatches" style="margin-bottom:10px">
      <button class="swatch active" style="background:#39ff14" data-c="#39ff14"></button>
      <button class="swatch" style="background:#ff3b5c" data-c="#ff3b5c"></button>
      <button class="swatch" style="background:#ffd23b" data-c="#ffd23b"></button>
      <button class="swatch" style="background:#3bc9ff" data-c="#3bc9ff"></button>
      <button class="swatch" style="background:#b06bff" data-c="#b06bff"></button>
      <button class="swatch" style="background:#ffffff" data-c="#ffffff"></button>
      <button class="swatch" style="background:#ff8a3b" data-c="#ff8a3b"></button>
      <button class="swatch" style="background:#1bd49a" data-c="#1bd49a"></button>
      <button class="swatch" style="background:#ff5edb" data-c="#ff5edb"></button>
      <button class="swatch" style="background:#7a7a88" data-c="#7a7a88"></button>
      <button class="swatch" style="background:#2b2b36" data-c="#2b2b36"></button>
      <button class="swatch" style="background:#000000" data-c="#000000"></button>
    </div>
    <input type="color" id="color" class="col-color" value="#39ff14">
  </div>

  <!-- RIGHT: scene -->
  <div class="panel right mica-panel" id="panel-right">
    <h2 class="title" style="margin-bottom:14px">Scene</h2>
    <h3 class="section" style="margin-bottom:8px">View</h3>
    <div class="grid3" style="margin-bottom:16px">
      <button class="gridbtn" data-cam="front">Front</button>
      <button class="gridbtn" data-cam="34">¾</button>
      <button class="gridbtn" data-cam="side">Side</button>
      <button class="gridbtn" data-cam="back">Back</button>
      <button class="gridbtn" data-cam="top">Top</button>
    </div>
    <h3 class="section" style="margin-bottom:8px">Silhouette</h3>
    <button class="btn-soft" id="aicut" title="Use AI to cut the subject from any background"
            style="width:100%;margin-bottom:16px">✨ AI cut-out</button>
    <h3 class="section" style="margin-bottom:8px">Floor
      <span id="measure" class="mono" style="font-weight:400;text-transform:none;letter-spacing:0;color:rgba(255,255,255,0.5)"></span>
    </h3>
    <input type="range" id="ynudge" min="-1" max="1" step="0.01" value="0" style="width:100%;margin-bottom:10px">
    <div class="row" style="margin-bottom:16px">
      <button class="btn-soft" id="snap">Snap to floor</button>
      <button class="btn-soft" id="showbox">Show box</button>
    </div>
    <div class="row">
      <button class="btn-soft" id="clear">Clear paint</button>
      <button class="btn-soft" id="reset">Recenter</button>
    </div>
  </div>

  <!-- BOTTOM: character tray -->
  <div class="panel bottom mica-panel" id="panel-bottom">
    <h2 class="title" style="margin-bottom:12px">Characters</h2>
    <div id="tray"></div>
  </div>

  <!-- Floating overlays -->
  <div id="status" class="mica-panel">pick a character below</div>
  <div id="hud"><span class="dot"></span><span id="hud-text"></span></div>
  <div id="stick" data-thumbstick>
    <div class="label lt">File</div><div class="label lb">Cast</div>
    <div class="label ll">Tools</div><div class="label lr">Scene</div>
    <div id="nub"><div class="core"></div></div>
  </div>
</div>

<!-- ===== Shell controller: Sys-free port of FlickPaint's initShell + initStick =====
     Drives the glass panels (body[data-view]), edge-swipe, and the joystick.
     The 3D engine (app.js) is untouched; it only talks to the controls inside the panels. -->
<script>
(function () {
  const body = document.body;
  const $ = (id) => document.getElementById(id);
  const stick = $('stick'), nub = $('nub');

  function setView(v) { body.dataset.view = v; syncStick(); }
  function toggleView(v) { setView(body.dataset.view === v ? 'center' : v); }

  // edge-grip tabs
  document.querySelectorAll('.tab[data-toggle]').forEach(t =>
    t.addEventListener('click', () => toggleView(t.dataset.toggle)));
  // dismiss overlay + top blind
  $('dismiss').addEventListener('click', () => setView('center'));
  $('chev').addEventListener('click', () => toggleView('top'));

  // edge-only swipe so it never fights OrbitControls / painting on the canvas
  const ET = 28;
  let sx = 0, sy = 0, tracking = false;
  addEventListener('pointerdown', (e) => {
    if (e.target.closest('.panel, #top, #stick, #tray')) { tracking = false; return; }
    const w = innerWidth, h = innerHeight;
    tracking = (e.clientX < ET || e.clientX > w - ET || e.clientY > h - ET);
    sx = e.clientX; sy = e.clientY;
  }, true);
  addEventListener('pointerup', (e) => {
    if (!tracking) return; tracking = false;
    const dx = e.clientX - sx, dy = e.clientY - sy, ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) < 40) return;
    if (ax > ay) { if (sx < ET && dx > 0) setView('left'); else if (sx > innerWidth - ET && dx < 0) setView('right'); }
    else { if (sy > innerHeight - ET && dy < 0) setView('bottom'); }
  });

  // thumbstick (touch): flick toward an edge to open that panel
  const LABEL = { left: '.ll', right: '.lr', top: '.lt', bottom: '.lb' };
  function syncStick() {
    stick.querySelectorAll('.label').forEach(l => l.classList.remove('act'));
    const sel = LABEL[body.dataset.view];
    if (sel) stick.querySelector(sel).classList.add('act');
  }
  stick.style.right = '18px'; stick.style.bottom = '128px'; stick.style.left = 'auto'; stick.style.top = 'auto';

  let dragging = false, cx = 0, cy = 0;
  stick.addEventListener('pointerdown', (e) => {
    e.stopPropagation(); dragging = true;
    const r = stick.getBoundingClientRect(); cx = r.left + r.width / 2; cy = r.top + r.height / 2;
    try { stick.setPointerCapture(e.pointerId); } catch (_) {}
  });
  stick.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    let dx = e.clientX - cx, dy = e.clientY - cy;
    const max = 36, d = Math.hypot(dx, dy); if (d > max) { dx = dx / d * max; dy = dy / d * max; }
    nub.style.transform = `translate(${dx}px, ${dy}px)`;
  });
  function endStick(e) {
    if (!dragging) return; dragging = false; nub.style.transform = '';
    const dx = e.clientX - cx, dy = e.clientY - cy, ax = Math.abs(dx), ay = Math.abs(dy);
    if (Math.max(ax, ay) > 22) {
      if (ax > ay) setView(dx < 0 ? 'left' : 'right');
      else setView(dy < 0 ? 'top' : 'bottom');
    }
  }
  stick.addEventListener('pointerup', endStick);
  stick.addEventListener('pointercancel', endStick);

  // joystick on/off (deck toggle). On desktop the stylesheet hides #stick via !important.
  let thumbOn = true;
  const tg = $('stick-toggle');
  function applyThumb() { stick.style.display = thumbOn ? 'flex' : 'none'; tg.classList.toggle('on', thumbOn); }
  tg.addEventListener('click', () => { thumbOn = !thumbOn; applyThumb(); });

  applyThumb(); syncStick();
})();
</script>

<script type="importmap">
{
  "imports": {
    "three": "./vendor/three.module.min.js",
    "three/addons/": "./vendor/addons/"
  }
}
</script>
<script type="module" src="./app.js"></script>
<script src="../../shared/presenter.js"></script>
</body>
</html>
