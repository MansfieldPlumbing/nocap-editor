<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit - Standalone Editor</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace']
          },
          animation: {
            'fade-in': 'fadeIn 0.15s ease-out',
            'slide-in': 'slideIn 0.2s cubic-bezier(0.16, 1, 0.3, 1)',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' }
            },
            slideIn: {
              '0%': { transform: 'translateX(20px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' }
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Core React and Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Monaco Editor Loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

  <style>
    /* Sleek Scrollbars */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-[#111111] text-[#f2f2f2] font-sans antialiased overflow-hidden select-none w-screen h-screen">

  <div id="root" class="w-full h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const cn = (...classes) => classes.filter(Boolean).join(' ');

    const Icons = {
      Folder: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
      ),
      File: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
      ),
      ArrowUp: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      ),
      Plus: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      ),
      Save: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      ),
      Scissors: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line></svg>
      ),
      Copy: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      ),
      ClipboardPaste: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
      ),
      Type: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line></svg>
      ),
      ArrowUpDown: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline><polyline points="5 12 12 5 19 12"></polyline></svg>
      ),
      Search: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      ),
      Settings: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      ),
      X: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      ),
      Map: ({ size = 16, className = "" }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
      )
    };

    // Monaco Editor Component via AMD loader
    function MonacoWrapper({ value, language, theme, onChange, onMount, options }) {
       const containerRef = useRef(null);
       const editorInstanceRef = useRef(null);

       useEffect(() => {
          if (!containerRef.current) return;

          // Ensure loader is ready
          const initMonaco = () => {
             window.require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
             window.require(['vs/editor/editor.main'], () => {
                if (!containerRef.current) return;
                
                // Dispose previous if any
                if (editorInstanceRef.current) {
                   editorInstanceRef.current.dispose();
                }

                const editor = window.monaco.editor.create(containerRef.current, {
                   value: value || '',
                   language: language || 'javascript',
                   theme: theme || 'vs-dark',
                   automaticLayout: true,
                   ...options
                });
                
                editorInstanceRef.current = editor;

                if (onMount) {
                   onMount(editor, window.monaco);
                }

                editor.onDidChangeModelContent(() => {
                   onChange(editor.getValue());
                });

                // Add simple save action (Ctrl/Cmd + S) to prevent browser save
                editor.addCommand(window.monaco.KeyMod.CtrlCmd | window.monaco.KeyCode.KeyS, () => {
                   document.dispatchEvent(new Event('editor-save'));
                });
             });
          };

          if (window.require) {
             initMonaco();
          } else {
             // Polling if script hasn't loaded yet
             const poll = setInterval(() => {
                if (window.require) {
                   clearInterval(poll);
                   initMonaco();
                }
             }, 100);
          }

          return () => {
             if (editorInstanceRef.current) {
                editorInstanceRef.current.dispose();
             }
          };
       }, []); // Only mount once

       // Update theme when changed
       useEffect(() => {
          if (window.monaco && editorInstanceRef.current) {
             window.monaco.editor.setTheme(theme);
             editorInstanceRef.current.updateOptions(options);
          }
       }, [theme, options]);

       return <div ref={containerRef} className="w-full h-full"></div>;
    }

    const WinToggle = ({ checked, onChange }) => (
      <button 
        onClick={() => onChange(!checked)}
        className={cn(
          "w-[40px] h-[20px] rounded-full border border-transparent relative transition-colors duration-200 shrink-0 cursor-pointer", 
          checked ? "bg-[#005fb8] hover:bg-[#005fb8]/90" : "bg-transparent border-[#878787] hover:border-[#a0a0a0]"
        )}
      >
        <div className={cn(
          "absolute top-1/2 -translate-y-1/2 w-[12px] h-[12px] rounded-full transition-all duration-200", 
          checked ? "bg-white left-[24px]" : "bg-[#878787] left-[3px]"
        )} />
      </button>
    );

    const SettingsCard = ({ title, description, children }) => (
      <div className="bg-[#202020] p-4 rounded-sm border border-transparent flex items-center justify-between mb-1 gap-4">
        <div className="flex-1">
          <div className="text-[14px] font-medium text-white">{title}</div>
          {description && <div className="text-[12px] text-gray-400 mt-1 leading-relaxed">{description}</div>}
        </div>
        <div className="shrink-0">{children}</div>
      </div>
    );

    // Ergonomic Toolbar Button
    const ToolbarButton = ({ icon: Icon, label, onClick, isActive, colorClass = "text-white/80", title }) => (
       <button 
         onClick={onClick}
         title={title || label}
         className={cn(
           "flex items-center gap-1.5 hover:bg-white/10 px-2.5 py-1.5 rounded-md cursor-pointer transition-colors",
           isActive ? "bg-white/10 text-white" : colorClass
         )}
       >
         <Icon size={16} />
         {label && <span className="text-[13px]">{label}</span>}
       </button>
    );

    const INITIAL_CONTENT = `/**
 * Standalone Editor
 * -----------------
 * A sleek, single-file IDE styled with aesthetic minimalism.
 * Fully operable and highly optimized.
 */

function initiateSequence() {
    console.log("Environment loaded.");
    const modules = [
        "Core",
        "Graphics",
        "Network",
        "FileSystem"
    ];
    
    // Sort lines feature will beautifully organize these array elements
    // if you highlight them and click the Sort icon above.
    
    return modules.map(m => \`Initialize: \${m}\`);
}

initiateSequence();
`;

    // The Main App Component
    function MainApp() {
       const [filePath, setFilePath] = useState('C:/projects/app/main.js');
       const [editorValue, setEditorValue] = useState(INITIAL_CONTENT);
       const [isModified, setIsModified] = useState(false);
       const [notification, setNotification] = useState("");
       
       // Settings State
       const [wordWrap, setWordWrap] = useState(false);
       const [minimap, setMinimap] = useState(true);
       const [theme, setTheme] = useState("vs-dark");
       const [fontSize, setFontSize] = useState(14);
       const [openSettings, setOpenSettings] = useState(false);
       
       // Cursor State
       const [cursorPos, setCursorPos] = useState({ line: 1, column: 1 });
       
       const editorRef = useRef(null);
       const monacoRef = useRef(null);

       const handleContentChange = (val) => {
          setEditorValue(val);
          setIsModified(true);
       };

       const handleMount = (editor, monaco) => {
          editorRef.current = editor;
          monacoRef.current = monaco;
          
          editor.onDidChangeCursorPosition((e) => {
             setCursorPos({
                line: e.position.lineNumber,
                column: e.position.column
             });
          });
       };

       const showNotification = (msg) => {
          setNotification(msg);
          setTimeout(() => setNotification(""), 3000);
       };

       // Toolbar Actions
       const handleSave = () => {
          if (editorRef.current) {
             setIsModified(false);
             showNotification("File saved to local memory");
          }
       };

       // Listen for the custom event dispatched from the Monaco save command
       useEffect(() => {
          const onSave = () => handleSave();
          document.addEventListener('editor-save', onSave);
          return () => document.removeEventListener('editor-save', onSave);
       }, []);

       const handleNew = () => {
          setFilePath('C:/projects/app/untitled.txt');
          if (editorRef.current) {
             editorRef.current.setValue('');
          } else {
             setEditorValue('');
          }
           setIsModified(false);
       };
       
       const handleCut = () => {
          if (editorRef.current) {
             editorRef.current.trigger('toolbar', 'editor.action.clipboardCutAction', null);
          }
       };
       const handleCopy = () => {
          if (editorRef.current) {
             editorRef.current.trigger('toolbar', 'editor.action.clipboardCopyAction', null);
          }
       };
       const handlePaste = () => {
          if (editorRef.current) {
             // In browser, standard paste might require permissions, mostly handled by native shortcut
             // We can trigger an action or alert user
             navigator.clipboard.readText().then(text => {
                const selection = editorRef.current.getSelection();
                editorRef.current.executeEdits('clipboard', [{
                   range: selection,
                   text: text,
                   forceMoveMarkers: true
                }]);
             }).catch(() => {
                showNotification("Please use Ctrl+V / Cmd+V to paste");
             });
          }
       };
       const handleSearch = () => {
          if (editorRef.current) {
             editorRef.current.trigger('toolbar', 'actions.find', null);
          }
       };
       const handleSortLines = () => {
          if (editorRef.current) {
             const selection = editorRef.current.getSelection();
             const model = editorRef.current.getModel();
             
             let range = selection;
             let text = "";
             
             if (selection.isEmpty()) {
                text = model.getValue();
                range = model.getFullModelRange();
             } else {
                text = model.getValueInRange(selection);
             }
             
             if (!text.trim()) {
                showNotification("Nothing to sort");
                return;
             }
             
             const lines = text.split(/\r?\n/).sort((a, b) => a.localeCompare(b));
             editorRef.current.executeEdits('sort', [{
                range: range,
                text: lines.join('\n'),
                forceMoveMarkers: true
             }]);
          }
       };

       // Extracted language for status bar
       const getLang = () => {
          const ext = filePath.split('.').pop().toLowerCase();
          switch(ext) {
             case 'js': return 'javascript';
             case 'ts': return 'typescript';
             case 'html': return 'html';
             case 'css': return 'css';
             case 'json': return 'json';
             default: return 'plaintext';
          }
       };

       const monacoOptions = {
          minimap: { enabled: minimap, scale: 0.75, renderCharacters: false },
          wordWrap: wordWrap ? 'on' : 'off',
          fontSize: fontSize,
          scrollBeyondLastLine: false,
          smoothScrolling: true,
          cursorBlinking: "smooth",
          cursorSmoothCaretAnimation: "on",
          padding: { top: 12 },
          scrollbar: {
             verticalScrollbarSize: 10,
             horizontalScrollbarSize: 10
          }
       };

       return (
          <div className="flex flex-col h-full w-full bg-[#1e1e1e] overflow-hidden relative">
             
             {/* 1. Header & Address Bar */}
             <div className="flex items-center gap-2 h-14 bg-[#212121] px-4 shrink-0 border-b border-[#111111]/80 shadow-sm z-20">
                <Icons.File size={18} className="text-[#60cdff] shrink-0" />
                
                <div className="flex-1 min-w-0 max-w-2xl relative">
                  <input 
                    type="text" 
                    value={filePath}
                    onChange={(e) => setFilePath(e.target.value)}
                    className="w-full text-[13px] bg-[#1a1a1a] border border-[#2b2b2b] focus:border-[#005fb8] rounded-md h-[32px] pl-3 pr-10 text-white/95 focus:outline-none transition-colors"
                  />
                  {isModified && (
                     <div className="absolute right-3 top-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-orange-400 animate-pulse-fast hover:shadow-[0_0_8px_rgba(251,146,60,0.6)] cursor-help" title="Unsaved changes"></div>
                  )}
                </div>
             </div>

             {/* 2. Ergonomic Command Ribbon */}
             <div className="flex items-center h-12 bg-[#1c1c1c] px-3 shrink-0 border-b border-[#111111]/40 z-10 overflow-x-auto hide-scrollbar select-none gap-1">
                
                {/* File Group */}
                <ToolbarButton icon={Icons.Plus} label="New" onClick={handleNew} colorClass="text-[#60cdff]" title="Create a new file buffer" />
                <ToolbarButton icon={Icons.Save} label="Save" onClick={handleSave} colorClass={isModified ? "text-orange-400" : "text-white/80"} title="Save file to memory" />
                
                <div className="w-[1px] h-5 bg-[#333] mx-1 shrink-0"></div>
                
                {/* Edit Group */}
                <ToolbarButton icon={Icons.Scissors} onClick={handleCut} title="Cut" />
                <ToolbarButton icon={Icons.Copy} onClick={handleCopy} title="Copy" />
                <ToolbarButton icon={Icons.ClipboardPaste} onClick={handlePaste} title="Paste" />
                
                <div className="w-[1px] h-5 bg-[#333] mx-1 shrink-0"></div>

                {/* Operations Group */}
                <ToolbarButton icon={Icons.Search} label="Find" onClick={handleSearch} title="Find and replace" />
                <ToolbarButton icon={Icons.ArrowUpDown} label="Sort" onClick={handleSortLines} title="Sort highlighted lines alphabetically" />
                <ToolbarButton icon={Icons.Type} label={wordWrap ? "Unwrap" : "Wrap"} isActive={wordWrap} onClick={() => setWordWrap(!wordWrap)} title="Toggle Word Wrap" />
                
                <div className="w-[1px] h-5 bg-[#333] mx-1 shrink-0"></div>

                {/* View Group */}
                <ToolbarButton icon={Icons.Map} label="Minimap" isActive={minimap} onClick={() => setMinimap(!minimap)} title="Toggle Minimap" />
                <ToolbarButton icon={Icons.Settings} label="Settings" onClick={() => setOpenSettings(true)} title="Editor Preferences" />

             </div>

             {/* 3. Main Monaco Editor Container */}
             <div className="flex-1 w-full relative">
                <MonacoWrapper 
                   value={editorValue}
                   language={getLang()}
                   theme={theme}
                   onChange={handleContentChange}
                   onMount={handleMount}
                   options={monacoOptions}
                />
             </div>

             {/* 4. Status Bar */}
             <div className="h-7 border-t border-[#202020] bg-[#1a1a1a] px-4 shrink-0 flex items-center justify-between text-[11px] text-[#878787] select-none font-mono">
                <div className="flex items-center gap-4">
                   <span>Ln {cursorPos.line}, Col {cursorPos.column}</span>
                </div>
                <div className="flex items-center gap-4">
                   <span className="uppercase">{getLang()}</span>
                   <span>{new Blob([editorValue]).size} bytes</span>
                </div>
             </div>

             {/* Dynamic Notification Bubble */}
             {notification && (
                <div className="absolute right-4 bottom-10 bg-[#005fb8] text-white px-4 py-2 rounded shadow-lg text-[13px] animate-slide-in z-40 border border-[#0074e0]">
                   {notification}
                </div>
             )}

             {/* 5. Settings Slideout Panel */}
             {openSettings && (
                <div className="fixed inset-0 flex z-50 animate-fade-in bg-black/40 backdrop-blur-sm">
                   
                   <div className="w-full absolute inset-0 cursor-pointer" onClick={() => setOpenSettings(false)}></div>
                   
                   <div className="ml-auto w-full max-w-md h-full bg-[#111111] border-l border-[#2b2b2b] flex flex-col shadow-2xl relative animate-slide-in">
                      <div className="h-14 bg-[#1c1c1c] border-b border-[#2b2b2b] flex items-center justify-between px-6 shrink-0">
                         <h2 className="text-white text-[15px] font-medium tracking-wide">Editor Settings</h2>
                         <button onClick={() => setOpenSettings(false)} className="text-white/60 hover:text-white p-2">
                            <Icons.X size={16} />
                         </button>
                      </div>
                      
                      <div className="flex-1 overflow-y-auto p-6 space-y-6">
                         
                         <div>
                            <h3 className="text-[12px] font-semibold text-white/40 uppercase tracking-widest mb-3">Appearance</h3>
                            
                            <SettingsCard title="High Contrast Dark Theme" description="Render the editor canvas using pure black backgrounds for maximum contrast.">
                               <WinToggle checked={theme === "hc-black"} onChange={(v) => setTheme(v ? "hc-black" : "vs-dark")} />
                            </SettingsCard>
                            
                            <SettingsCard title="Code Minimap" description="Render a zoomed-out visual guide of the entire document on the right side.">
                               <WinToggle checked={minimap} onChange={setMinimap} />
                            </SettingsCard>
                         </div>

                         <div>
                            <h3 className="text-[12px] font-semibold text-white/40 uppercase tracking-widest mb-3">Behavior</h3>
                            
                            <SettingsCard title="Soft Word Wrapping" description="Lines that exceed the viewing window will carry over to the next line dynamically.">
                               <WinToggle checked={wordWrap} onChange={setWordWrap} />
                            </SettingsCard>
                         </div>
                         
                         <div>
                            <h3 className="text-[12px] font-semibold text-white/40 uppercase tracking-widest mb-3">Typography</h3>
                            <div className="bg-[#202020] p-4 rounded-sm">
                               <label className="text-[13px] text-white/80 block mb-2">Font Size ({fontSize}px)</label>
                               <input 
                                  type="range"
                                  min="10"
                                  max="24"
                                  step="1"
                                  value={fontSize}
                                  onChange={(e) => setFontSize(parseInt(e.target.value))}
                                  className="w-full h-1 bg-[#444] rounded appearance-none cursor-pointer accent-[#005fb8]"
                               />
                            </div>
                         </div>
                      </div>
                   </div>
                </div>
             )}

          </div>
       );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>

</body>
</html>
