options = tabbar:Tab Bar, taskbar:Task Bar
storeKey = barStyle
parent = Settings.Personalization.Appearance


[Settings.Personalization.Appearance.BgOpacity]
type = Slider
label = Background Opacity
caption = Controls transparency of the desktop background and windows
min = 0
max = 1
value = 0.5
multiplier = 100
unit = %
storeKey = bgOpacity
parent = Settings.Personalization.Appearance


[Settings.Personalization.Appearance.PanelOpacity]
type = Slider
label = Panel Opacity
caption = Controls transparency of the content panels and plates
min = 0
max = 1
value = 0.05
multiplier = 100
unit = %
storeKey = panelOpacity
parent = Settings.Personalization.Appearance


[Settings.Personalization.Appearance.Scale]
type = Slider
label = UI Scale & Font Size
caption = Adjusts the overall density, font sizes, and context menu sizing globally.
min = 0.5
max = 1.5
value = 1
multiplier = 100
unit = %
storeKey = uiScale
parent = Settings.Personalization.Appearance


[Settings.Personalization.Appearance.TaskbarOpacity]
type = Slider
label = Task bar opacity
caption = Controls transparency of the taskbar, menus, and popups

max = 1
value = 0.85
multiplier = 100
unit = %
storeKey = micaOpacity
parent = Settings.Personalization.Appearance

component = NativeColorSchemeEditor
