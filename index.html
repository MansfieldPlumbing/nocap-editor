<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#0b0c10" />
  <title>CoolPro — FOSS A/V · paint · 3D studio</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235b8cff'/%3E%3Ctext x='16' y='22' font-size='15' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='700'%3EC%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="app.css" />
  <!-- form-factor signal, set before first paint (no flash). Banks off "Desktop site": that
       widens the layout viewport, so the width check below reports desktop. -->
  <script>
    try { var p = localStorage.getItem('coolpro-view');
      document.documentElement.dataset.vp = (p === 'desktop' || p === 'phone') ? p
        : ((window.innerWidth || 1024) >= 820 ? 'desktop' : 'phone');
    } catch (e) { document.documentElement.dataset.vp = 'desktop'; }
  </script>
</head>
<body data-app="editor">
  <!-- ═══════════════════════ the Shell ═══════════════════════
       Chrome that projects the namespace. Holds no document truth: it mounts the active
       presenter into the stage and presents its verbs. (subsystem Shell.js, ported.) -->
  <div id="shell">
    <header class="shell-bar">
      <button id="brandHome" class="brand" title="Home"><b>Cool<span class="no">Pro</span></b><small>FOSS studio</small></button>
      <nav id="appRail" class="app-rail" aria-label="Apps"></nav>
      <div class="spacer"></div>
      <div id="shellMenu" class="shell-menu"></div>
      <button id="vpToggle" class="btn ghost vp-toggle" title="Switch view">🖥</button>
    </header>

    <div id="stage" class="stage-host">
      <!-- ── launcher: the front door (phone-first — arrive at a chooser, not a surface) ── -->
      <section id="surface-home" class="surface">
        <div class="launcher">
          <div class="launcher-head">
            <h1>Cool<span class="no">Pro</span></h1>
            <p>FOSS on-device studio — video, audio, image &amp; 3D. Pick a surface.</p>
          </div>
          <div id="launchGrid" class="launch-grid"></div>
        </div>
      </section>

      <!-- ── native surface: the CapCut-style A/V editor ── -->
      <section id="surface-editor" class="surface" hidden>
        <div id="app">
          <!-- top bar -->
          <header class="topbar">
            <input id="projName" class="proj-name" value="Untitled project" spellcheck="false" />
            <div class="spacer"></div>
            <button id="btnInstall" class="btn ghost" title="Install app" hidden>📲 Install</button>
            <button id="btnAddons" class="btn ghost" title="Add-ons & CDN cache">🧩 Add-ons</button>
            <button id="btnSave" class="btn ghost" title="Save to browser storage">💾 Save</button>
            <button id="btnExport" class="btn primary">⤓ Export</button>
          </header>

          <!-- left: media bin -->
          <aside class="side left">
            <h3>Media</h3>
            <div class="scroll">
              <div id="dropzone" class="dropzone">＋ Tap to add media<br /><small>or drop video / audio / images</small></div>
              <div id="bin" class="bin"></div>
              <div id="binEmpty" class="empty">Your media bin is empty.</div>
            </div>
            <input id="filePicker" type="file" accept="video/*,audio/*,image/*" multiple hidden />
          </aside>

          <!-- center: preview -->
          <main class="stage">
            <div class="viewport"><canvas id="preview" width="1280" height="720"></canvas></div>
            <div class="transport">
              <div class="time"><b id="tCur">0:00.00</b> / <span id="tDur">0:00.00</span></div>
              <button id="btnToStart" class="tbtn" title="To start">⏮</button>
              <button id="btnPlay" class="tbtn play" title="Play / Pause (Space)">▶</button>
              <button id="btnToEnd" class="tbtn" title="To end">⏭</button>
              <div class="spacer"></div>
              <button id="btnSplit" class="btn ghost" title="Split clip at playhead (S)">✂ Split</button>
              <button id="btnDelete" class="btn ghost" title="Delete selected clip (Del)">🗑 Delete</button>
            </div>
          </main>

          <!-- right: FX / properties -->
          <aside class="side right">
            <div class="tabs">
              <div class="tab active" data-tab="props">Clip</div>
              <div class="tab" data-tab="afx">Audio FX</div>
              <div class="tab" data-tab="vfx">Video FX</div>
              <div class="tab" data-tab="ai">AI</div>
            </div>
            <div class="scroll">
              <div class="tabpane" data-pane="props"></div>
              <div class="tabpane" data-pane="afx" hidden></div>
              <div class="tabpane" data-pane="vfx" hidden></div>
              <div class="tabpane" data-pane="ai" hidden></div>
            </div>
          </aside>

          <!-- bottom: timeline -->
          <section class="timeline">
            <div class="tl-toolbar">
              <button id="btnAddVideoTrack" class="btn ghost" title="Add video track">＋ Video track</button>
              <button id="btnAddAudioTrack" class="btn ghost" title="Add audio track">＋ Audio track</button>
              <div class="spacer"></div>
              <div class="tl-zoom">
                <span>Zoom</span>
                <input id="tlZoom" type="range" min="20" max="400" value="90" />
              </div>
            </div>
            <div class="tl-scroll" id="tlScroll">
              <div class="tl-canvas-wrap" id="tlWrap">
                <canvas id="tl-canvas"></canvas>
                <div id="tl-playhead"></div>
              </div>
            </div>
          </section>
        </div>
      </section>

      <!-- ── guest surfaces: paint & 3D mount here as hosted iframes ── -->
      <div id="stage-guests" class="surface" hidden></div>
    </div>
  </div>

  <div id="hud"></div>

  <script type="module" src="src/app.js"></script>
  <script type="module">
    import { initViewport } from './src/viewport.js';
    import { initShell } from './src/shell.js';
    import { initShare } from './src/share.js';
    function boot() { initViewport(); initShell(); initShare(); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
    else boot();
  </script>
</body>
</html>
